<!DOCTYPE html>
<html>
<head>

<title>Seal vs Cat Detector</title>

<style>

body{
font-family: Arial, sans-serif;
text-align: center;
background: linear-gradient(135deg,#a8f0e6,#ffd6ec);
margin:0;
padding:40px;
}

h1{
font-size:42px;
color:#333;
}

button{
background:#ff8ac9;
color:white;
border:none;
padding:12px 25px;
font-size:18px;
border-radius:25px;
cursor:pointer;
transition:transform 0.2s;
margin:10px;
}

button:hover{
transform:scale(1.08);
background:#00c9b7;
}

#label-container{
font-size:32px;
margin-top:20px;
font-weight:bold;
}

canvas{
margin-top:20px;
border-radius:15px;
box-shadow:0px 6px 20px rgba(0,0,0,0.2);
}

.animals{
font-size:60px;
margin:20px;
}

.cat{
display:inline-block;
animation: floatCat 3s ease-in-out infinite;
}

.seal{
display:inline-block;
animation: floatSeal 3s ease-in-out infinite;
}

@keyframes floatCat{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

@keyframes floatSeal{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

</style>
  
</head>

<body>

<h1>Seal vs Cat AI Detector</h1>

<div class="animals">
<span class="cat">🐱</span>
<span class="seal">🦭</span>
</div>

<button onclick="init()">Start Camera</button>

<div id="webcam-container"></div>

<button onclick="capture()">Capture Snapshot</button>

<br>

<canvas id="snapshot" width="400" height="400"></canvas>

<div id="label-container">Prediction will appear here</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.9.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>

const URL = "./model/";

let model, webcam;

async function init() {

const modelURL = URL + "model.json";
const metadataURL = URL + "metadata.json";

model = await tmImage.load(modelURL, metadataURL);

webcam = new tmImage.Webcam(400,400,true);

await webcam.setup();
await webcam.play();

window.requestAnimationFrame(loop);

document.getElementById("webcam-container").appendChild(webcam.canvas);

}

async function loop(){

webcam.update();
await predict();

window.requestAnimationFrame(loop);

}

async function predict(){

const prediction = await model.predict(webcam.canvas);

let output = "";

for (let i = 0; i < prediction.length; i++) {

let percent = (prediction[i].probability * 100).toFixed(1);

let emoji = "";

if(prediction[i].className.toLowerCase().includes("cat")){
emoji = "🐱";
}

else if(prediction[i].className.toLowerCase().includes("seal")){
emoji = "🦭";
}

output += emoji + " " + prediction[i].className + ": " + percent + "%<br><br>";

}

document.getElementById("label-container").innerHTML =
"<span style='color:#ff69b4'>🐱 Cat</span>: " + cat + "%<br><br>" +
"<span style='color:#00bfb3'>🦭 Seal</span>: " + seal + "%";
  
}

function capture(){

const canvas = document.getElementById("snapshot");
const context = canvas.getContext("2d");

context.drawImage(webcam.canvas, 0, 0, 400, 400);

}

</script>

</body>
</html>
